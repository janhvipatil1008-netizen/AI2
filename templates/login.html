<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI² — Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      width: 100%;
      max-width: 360px;
    }
    .login-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #7c6af7, #4fc3f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .login-field { margin-bottom: 1.25rem; }
    .login-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }
    .login-field input:focus { border-color: #7c6af7; }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #7c6af7, #4fc3f7);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-error {
      color: #f87171;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: rgba(248,113,113,0.1);
      border-radius: 6px;
      border-left: 3px solid #f87171;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">AI²</div>
      <div class="login-subtitle">Adaptive AI Learning Platform</div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="login-field">
          <label for="password">Access Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Enter password" autofocus required>
        </div>
        <button type="submit" class="login-btn">Enter</button>
      </form>
    </div>
  </div>
</body>
</html>
