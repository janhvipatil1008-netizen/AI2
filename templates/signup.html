<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI² — Create Account</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      width: 100%;
      max-width: 400px;
    }
    .login-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      text-align: center;
      background: linear-gradient(135deg, #7c6af7, #4fc3f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .login-field { margin-bottom: 1.25rem; }
    .login-field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .login-field input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }
    .login-field input:focus { border-color: #7c6af7; }
    .login-btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #7c6af7, #4fc3f7);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-error {
      color: #f87171;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      padding: 0.5rem 0.75rem;
      background: rgba(248,113,113,0.1);
      border-radius: 6px;
      border-left: 3px solid #f87171;
    }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">AI²</div>
      <div class="login-subtitle">Adaptive AI Learning</div>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/signup">
        <div class="login-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email"
                 placeholder="you@example.com" autofocus required>
        </div>
        <div class="login-field">
          <label for="display_name">Display Name <span style="font-weight:400">(optional)</span></label>
          <input type="text" id="display_name" name="display_name"
                 placeholder="How should we address you?">
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="At least 8 characters" required minlength="8">
          <div class="hint">Minimum 8 characters</div>
        </div>
        <div class="login-field">
          <label for="confirm_password">Confirm Pass</label>
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Repeat your password" required>
        </div>
        <button type="submit" class="login-btn">Create Account</button>
      </form>
      <p style="text-align:center; margin-top:0.75rem; font-size:0.8rem; color:var(--muted);">
        <a href="/privacy" style="color:#7c6af7; text-decoration:none;">Privacy</a>
        <span>|</span>
        <a href="/terms" style="color:#7c6af7; text-decoration:none;">Terms</a>
      </p>
      <p style="text-align:center; margin-top:1.25rem; font-size:0.875rem; color:var(--muted);">
        Already have an account? <a href="/login" style="color:#7c6af7; text-decoration:none;">Sign in →</a>
      </p>
    </div>
  </div>
</body>
</html>
